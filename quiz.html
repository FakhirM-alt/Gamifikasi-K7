<!DOCTYPE html>
<!-- Coding By CodingNepal - youtube.com/@codingnepal -->
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz PixelPals | Group-7</title>

    <!-- Linking Google fonts for icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">


    <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  </head>

  <body>

    <!--Menu Screen-->
    <div class="menu-popup popup-container active">
      <div class="menu-container quiz-box">
        <div class="tab"> 

          <div class="circle-1"> </div>

          <div class="circle-2"> </div>

          <div class="circle-3"> </div>

        </div>

        <h2 class="menu-title">Select</h2>

        <button class="pixelify-sans-button open-quiz-btn">Open Quiz</button>
        <button class="pixelify-sans-button view-score-btn">View Scores</button>
      </div>
    </div>

    <!-- Quiz Configuration Popup -->
    <div class="config-popup popup-container">
      <div class="config-container quiz-box">

        <div class="tab">

          <div class="circle-group">
            <div class="circle-1"> </div>

            <div class="circle-2"> </div>

            <div class="circle-3"> </div>
          </div>

          <h2 class="jersey-10-regular config-title">Quiz Configuration</h2>
        </div>
        
        <div class="config-option">
          <h4 class="option-title">Select Category</h4>

          <div class="category-options">
            <button class="category-option active">PixelPals</button>
            <button class="category-option">Artist</button>
            <button class="category-option">Designer</button>
          </div>

        </div>
        <div class="config-option">
          <h4 class="option-title">Number of Questions</h4>

          <div class="question-options">
            <button class="question-option">5</button>
            <button class="question-option active">10</button>
            <button class="question-option">15</button>
          </div>
        </div>

        <button class="start-quiz-btn">Start</button>
      </div>
    </div>

    <!-- Quiz Popup -->
    <div class="quiz-popup popup-container">
      <div class="quiz-container quiz-box">
        <header class="quiz-header">
          <h2 class=" quiz-title">Quiz</h2>
          <div class="quiz-timer">
            <span class="material-symbols-rounded">timer</span>
            <p class="timer-duration"></p>
          </div>
        </header>

        <div class="quiz-content">
          <h1 class="question-text"></h1>
          <img src="" alt="Image Question" class="question-image" />
          <ul class="answer-options"></ul>
        </div>

        <div class="quiz-footer">
          <p class="question-status"></p>
          <button class="next-question-btn">
            Next
            <span class="material-symbols-rounded">arrow_right_alt</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Quiz Result Popup -->
    <div class="result-popup popup-container">
      <div class="result-container quiz-box">
        <img src="quiz-over.png" class="result-img" />
        <h2 class="result-title">Quiz Completed!</h2>
        <p class="result-message"></p>
        <h3 id="finalScore"></h3>

        <form>
          <input type="text" name="username" id="username" placeholder="username">
          <button type="submit" class="btn update-score-btn" id="saveScoreBtn" onclick="saveHighScore(event)" disabled>Save Score?</button>
        </form>

        <button class="try-again-btn">Try Again?</button>
      </div>
    </div>

    <!--Score Popup-->
    <div class="score-popup popup-container">
      <div class="score-container quiz-box">
        <h2 class="score-title">High Scores</h2>
        
        <ul id="highScoresList"></ul>

        <button class="start-up">Back to Menu</button>
      </div>
    </div>

    <!-- Scripts -->
    <script src="javascript/question.js"></script>
    <script src="javascript/script.js"></script>
    <script src="javascript/highscore.js"></script>
    <script src="javascript/update.js"></script>
  </body>
</html>
